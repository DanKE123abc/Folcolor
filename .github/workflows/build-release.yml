name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build Release
      run: |
        msbuild src/Controller/Controller.sln /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v143 /p:OutDir=bin/Release/
        
    - name: Create Release Artifact
      shell: pwsh
      run: |
        $artifactPath = "bin/Release"
        if (-not (Test-Path $artifactPath)) {
          New-Item -ItemType Directory -Path $artifactPath -Force | Out-Null
        }
        Copy-Item "src/Controller/Win32/Release/Folcolor.exe" -Destination "$artifactPath/" -Force -ErrorAction SilentlyContinue
        Copy-Item "src/Controller/Win32/Release/"*.dll -Destination "$artifactPath/" -Force -ErrorAction SilentlyContinue
        Get-ChildItem "$artifactPath" -Filter "*.exe" | ForEach-Object { Write-Host "Found: $($_.Name)" }
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: github.event_name != 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: build-${{ github.run_number }}
        name: Build #${{ github.run_number }}
        draft: true
        prerelease: true
        files: bin/Release/Folcolor.exe
        generate_release_notes: true